version: '3.8'

services:
  app:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: watson-whatsapp-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Server
      PORT: 8080
      
      # NeoHub (WhatsApp Broker)
      NEOHUB_BASE_URL: ${NEOHUB_BASE_URL}
      NEOHUB_API_KEY: ${NEOHUB_API_KEY}
      NEOHUB_WABA_ID: ${NEOHUB_WABA_ID}
      
      # WatsonX Assistant
      WATSONX_BASE_URL: ${WATSONX_BASE_URL}
      WATSONX_API_KEY: ${WATSONX_API_KEY}
      WATSONX_ENVIRONMENT_ID: ${WATSONX_ENVIRONMENT_ID}
      WATSONX_ASSISTANT_ID: ${WATSONX_ASSISTANT_ID}
      WATSONX_VERSION: ${WATSONX_VERSION:-2021-11-27}
      
      # Redis
      REDIS_ADDR: ${REDIS_ADDR}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    
    # Optional: uncomment if you want to use redis service below
    # depends_on:
    #   - redis
    
    networks:
      - app-network
    
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Local Redis (uncomment if not using external Redis)
  # redis:
  #   image: redis:7-alpine
  #   container_name: watson-redis
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   command: redis-server --requirepass ${REDIS_PASSWORD}
  #   volumes:
  #     - redis-data:/data
  #   networks:
  #     - app-network
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
  #     interval: 10s
  #     timeout: 3s
  #     retries: 5

networks:
  app-network:
    driver: bridge

